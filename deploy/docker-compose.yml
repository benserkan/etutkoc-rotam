# =============================================================================
# ETÜTKOÇ — Lightsail VPS Docker Compose
# 5 servis: web (FastAPI) + next (Next.js) + worker + db (Postgres) + proxy (Caddy)
#
# Kullanım (deploy/.env hazırlandıktan sonra):
#   cd deploy
#   docker compose up -d --build
#
# İlk açılışta:
#   1. db ayağa kalkar, healthcheck bekler
#   2. web başlar → start.sh: alembic upgrade head + seed + gunicorn
#   3. worker web sağlıklı olduğunda başlar (migration tamamlandı sayılır)
#   4. next başlar → SSR Server Component'leri internal network'ten web'e fetch eder
#   5. proxy Caddy HTTPS otomatik (Let's Encrypt) sertifikası alır + path-based routing
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL — SQLite'tan göç. Volume'da kalıcı.
  # ===========================================================================
  db:
    image: postgres:16-alpine
    container_name: lgs-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lgs}
      POSTGRES_USER: ${POSTGRES_USER:-lgs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lgs} -d ${POSTGRES_DB:-lgs}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]
    restart: unless-stopped

  # ===========================================================================
  # FastAPI web — Jinja sayfaları + /api/v1 + /api/v2 + webhooks
  # NOT: BACKGROUND görevler KAPALI (cron + dispatcher worker'da çalışır)
  # ===========================================================================
  web:
    build:
      context: ..                # proje kökü (Dockerfile burada)
      dockerfile: Dockerfile
    image: lgs-backend:latest
    container_name: lgs-web
    command: ["./start.sh"]      # alembic upgrade + seed + gunicorn
    environment:
      # ---- DB ----
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-lgs}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-lgs}
      # ---- Genel ----
      DEBUG: "false"
      SESSION_SECRET: ${SESSION_SECRET}
      APP_BASE_URL: https://${PUBLIC_DOMAIN}
      # ---- Auth ----
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: https://${PUBLIC_DOMAIN}
      # ---- BFF cookie (Next.js için) ----
      AUTH_COOKIE_ACCESS_NAME: __Host-access
      AUTH_COOKIE_REFRESH_NAME: __Host-refresh
      AUTH_COOKIE_SECURE: "true"     # HTTPS ardında — __Host- prefix aktive
      # ---- Email (SMTP) ----
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_USE_TLS: "true"
      SMTP_USE_SSL: "false"
      # ---- WhatsApp ----
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-true}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}  # GET /webhooks/whatsapp verify aşaması
      # ---- Yapay Zekâ (Gemini) — boş bırakılırsa süper admin panelden girilebilir ----
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}              # virgülle çoklu: ilk=ücretli, kalan=ücretsiz
      GEMINI_PAID_API_KEY: ${GEMINI_PAID_API_KEY:-}    # açıkça ücretli (öncelikli)
      GEMINI_FREE_API_KEYS: ${GEMINI_FREE_API_KEYS:-}  # virgülle ayrılmış ücretsiz key'ler
      GEMINI_PAID_MODEL: ${GEMINI_PAID_MODEL:-gemini-2.5-pro}
      GEMINI_FREE_MODEL: ${GEMINI_FREE_MODEL:-gemini-2.5-flash}
      # ---- Ödeme (Iyzico) — boş key = test modu; canlı için gerçek key + prod URL ----
      # Üretim: IYZICO_BASE_URL=https://api.iyzipay.com (sandbox: https://sandbox-api.iyzipay.com)
      IYZICO_API_KEY: ${IYZICO_API_KEY:-}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY:-}
      IYZICO_BASE_URL: ${IYZICO_BASE_URL:-https://sandbox-api.iyzipay.com}
      PAYMENT_CALLBACK_URL: ${PAYMENT_CALLBACK_URL:-https://${PUBLIC_DOMAIN}/api/v2/payment/iyzico/callback}
      # ---- Cloudflare Turnstile (CAPTCHA) — ikisi de boşsa otomatik kapalı ----
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-1}
      # ---- SMS (telefon doğrulama OTP) ----
      # SMS_ENABLED=false iken kod konsol log'una düşer + UI'da dev_test_code
      # olarak gösterilir. true ise gerçek SMS gönderir.
      # SMS_PROVIDER: "vatansms" (default — bireysel hesap kabul) veya "netgsm"
      SMS_ENABLED: ${SMS_ENABLED:-false}
      SMS_PROVIDER: ${SMS_PROVIDER:-vatansms}
      # VatanSMS (default) — TC kimlik + e-devlet belgesi ile bireysel hesap
      VATANSMS_API_ID: ${VATANSMS_API_ID:-}
      VATANSMS_API_KEY: ${VATANSMS_API_KEY:-}
      VATANSMS_SENDER: ${VATANSMS_SENDER:-}          # onaylı başlık (sender ID)
      VATANSMS_BASE_URL: ${VATANSMS_BASE_URL:-https://api.vatansms.net}
      # Netgsm (legacy — şirket gerekir; SMS_PROVIDER=netgsm yapılınca aktif olur)
      NETGSM_USER: ${NETGSM_USER:-}
      NETGSM_PASSWORD: ${NETGSM_PASSWORD:-}
      NETGSM_HEADER: ${NETGSM_HEADER:-}
      NETGSM_BASE_URL: ${NETGSM_BASE_URL:-https://api.netgsm.com.tr}
      # ---- Worker'la çakışma önlemi ----
      LGS_RUN_BACKGROUND: "false"    # web'de cron/dispatcher KAPALI
      # ---- Gunicorn ----
      WORKERS: ${WEB_WORKERS:-2}
      PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped
    volumes:
      # Yedek dizinini read-only mount et — /admin/system-health backup kartı
      # son yedek tarihi/boyutu/sayısını okuyabilsin (backup.sh aynı yere yazar)
      - ../backups:/opt/etutkoc/backups:ro
    # Web sağlıklı olduğunda worker + next bağlanabilir
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s   # alembic upgrade + seed zaman alabilir

  # ===========================================================================
  # Worker — Cron + notification dispatcher
  # KRİTİK: replicas: 1 — duplicate gönderim olmaması için ASLA scale etme
  # (R-004: notification_log'da SELECT...FOR UPDATE SKIP LOCKED henüz yok)
  # ===========================================================================
  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    image: lgs-backend:latest     # web ile aynı image
    container_name: lgs-worker
    command: ["python", "-m", "app.dispatcher", "--loop"]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-lgs}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-lgs}
      DEBUG: "false"
      SESSION_SECRET: ${SESSION_SECRET}
      APP_BASE_URL: https://${PUBLIC_DOMAIN}
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_USE_TLS: "true"
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-true}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}  # config tutarlılığı için (worker webhook karşılamaz)
      LGS_RUN_BACKGROUND: "true"    # SADECE worker'da açık
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy  # migration tamamlanmış sayılır
    networks: [internal]
    restart: unless-stopped
    # Healthcheck KAPALI — worker HTTP sunucusu DEĞİL (dispatcher döngüsü); web
    # image'ından miras "curl localhost:8000/healthz" hep başarısızdı → YANLIŞ
    # "unhealthy". Çökerse restart:unless-stopped yeniden başlatır.
    healthcheck:
      disable: true
    # scale: 1 (compose default) — manuel scale ETMEYİN
    deploy:
      replicas: 1

  # ===========================================================================
  # Next.js — App Router (RSC) + BFF route'ları
  # SSR fetch'leri internal:// http://web:8000 üzerinden
  # ===========================================================================
  next:
    build:
      context: ../web
      dockerfile: Dockerfile
    image: lgs-next:latest
    container_name: lgs-next
    environment:
      NODE_ENV: production
      # Server Component fetch hedefi (internal network)
      INTERNAL_API_URL: http://web:8000
      # Tarayıcı tarafı — same-origin (Caddy aynı domain'i sunar)
      NEXT_PUBLIC_PUBLIC_API_URL: ""
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # ---- Plausible (self-host) site analitiği — runtime env (boşsa kapalı) ----
      # PLAUSIBLE_DOMAIN: izleme script'inin data-domain'i (örn. rotam.etutkoc.com)
      # PLAUSIBLE_SRC: script yolu (first-party; Caddy /js/script.js → plausible)
      # PLAUSIBLE_SHARED_URL: süper admin gömülü panosu (Plausible paylaşım embed bağlantısı)
      # PLAUSIBLE_DASHBOARD_URL: "Tam panel" linki (örn. https://analytics.etutkoc.com)
      PLAUSIBLE_DOMAIN: ${PLAUSIBLE_DOMAIN:-}
      PLAUSIBLE_SRC: ${PLAUSIBLE_SRC:-/js/script.js}
      PLAUSIBLE_SHARED_URL: ${PLAUSIBLE_SHARED_URL:-}
      PLAUSIBLE_DASHBOARD_URL: ${PLAUSIBLE_DASHBOARD_URL:-}
    depends_on:
      web:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped
    # Healthcheck override — Dockerfile'daki "localhost" IPv6 (::1) çözümleniyor,
    # Next IPv4'te (0.0.0.0:3000) dinliyor → bağlanamayıp YANLIŞ "unhealthy"
    # veriyordu. 127.0.0.1 ile IPv4'e sabitle.
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ===========================================================================
  # Plausible (self-host, Community Edition) — gizlilik-dostu site analitiği.
  # Çerezsiz, kişisel veri yok (KVKK). Veri kendi sunucumuzda kalır.
  # Sürümler Plausible resmi community-edition compose'undan; gerekirse güncelle.
  # İlk kurulum + ENV üretimi: deploy/PLAUSIBLE_SETUP.md
  # ===========================================================================
  plausible_db:
    image: postgres:16-alpine
    container_name: lgs-plausible-db
    environment:
      POSTGRES_DB: plausible
      POSTGRES_USER: plausible
      POSTGRES_PASSWORD: ${PLAUSIBLE_DB_PASSWORD}
    volumes:
      - plausible-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible -d plausible"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]
    restart: unless-stopped

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: lgs-plausible-clickhouse
    volumes:
      - plausible-clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/logging.xml:/etc/clickhouse-server/config.d/logging.xml:ro
      - ./clickhouse/user-logging.xml:/etc/clickhouse-server/users.d/logging.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]
    restart: unless-stopped

  plausible:
    image: ghcr.io/plausible/community-edition:v2.1.4
    container_name: lgs-plausible
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      plausible_db:
        condition: service_healthy
      plausible_events_db:
        condition: service_healthy
    environment:
      BASE_URL: https://${PLAUSIBLE_HOST}
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE}
      TOTP_VAULT_KEY: ${PLAUSIBLE_TOTP_VAULT_KEY}
      DATABASE_URL: postgres://plausible:${PLAUSIBLE_DB_PASSWORD}@plausible_db:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://plausible_events_db:8123/plausible_events_db
      # İlk admin oluşturulduktan sonra true bırak (açık kayıt kapalı)
      DISABLE_REGISTRATION: ${PLAUSIBLE_DISABLE_REGISTRATION:-true}
    networks: [internal]
    restart: unless-stopped

  # ===========================================================================
  # Caddy reverse proxy + otomatik HTTPS (Let's Encrypt)
  # Tek dışa açık servis — 80/443 portları
  # ===========================================================================
  proxy:
    image: caddy:2-alpine
    container_name: lgs-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data            # certifikalar burada
      - caddy-config:/config
    depends_on:
      web:
        condition: service_healthy
      next:
        condition: service_started
    networks: [internal]
    restart: unless-stopped

# =============================================================================
# Network — sadece internal; proxy hariç dışa kapalı
# =============================================================================
networks:
  internal:
    driver: bridge

# =============================================================================
# Volumes — host'ta kalıcı veri
# =============================================================================
volumes:
  db-data:
    name: lgs-db-data
  caddy-data:
    name: lgs-caddy-data
  caddy-config:
    name: lgs-caddy-config
  plausible-db-data:
    name: lgs-plausible-db-data
  plausible-clickhouse-data:
    name: lgs-plausible-clickhouse-data
