{# Stage 14 — Streak + puan rozeti partial
   Beklenen: streak (int), points (PointBreakdown)
#}
<div class="flex flex-wrap items-stretch gap-3">
  <div class="flex-1 min-w-[180px] bg-gradient-to-br from-orange-50 to-amber-50 border border-amber-200 rounded-lg p-4">
    <div class="flex items-center gap-3">
      <div class="text-4xl">{% if streak >= 30 %}🏆{% elif streak >= 7 %}⚡{% elif streak >= 3 %}🔥{% else %}🌱{% endif %}</div>
      <div>
        <div class="text-3xl font-bold text-amber-900">{{ streak }}</div>
        <div class="text-xs text-amber-700 uppercase tracking-wider">günlük seri</div>
      </div>
    </div>
  </div>
  <div class="flex-1 min-w-[180px] bg-gradient-to-br from-indigo-50 to-violet-50 border border-violet-200 rounded-lg p-4">
    <div class="flex items-center gap-3">
      <div class="text-4xl">💎</div>
      <div>
        <div class="text-3xl font-bold text-violet-900">{{ points.total }}</div>
        <div class="text-xs text-violet-700 uppercase tracking-wider">toplam puan</div>
      </div>
    </div>
  </div>
</div>
