{# Mockup: FSRS rating butonları (slug=aralikli-tekrar).

   "Aralıklı Tekrar ve AI Önerileri" kartının sağındaki mini panel:
   bugünkü tekrar kartı + 4 rating butonu (Tekrar/Zor/İyi/Kolay).
   Anasayfa görüntüsü birebir korunur. #}
<div class="flex-shrink-0 w-full sm:w-44 rounded-xl p-3 border" style="background:#F8FAFC; border-color:rgba(124,58,237,0.15);">

    <span class="text-[9px] uppercase tracking-wider font-bold text-stone-400">Bugünkü kart</span>
    <span class="text-[9px] text-stone-400 font-mono">1 / 8</span>
  </div>

    <button class="text-[10px] font-bold py-1.5 rounded-md transition hover:brightness-110" style="background:#FEE2E2; color:#991B1B;">Tekrar</button>
    <button class="text-[10px] font-bold py-1.5 rounded-md transition hover:brightness-110" style="background:#FEF3C7; color:#92400E;">Zor</button>
    <button class="text-[10px] font-bold py-1.5 rounded-md transition hover:brightness-110" style="background:#D1FAE5; color:#065F46;">İyi</button>
    <button class="text-[10px] font-bold py-1.5 rounded-md transition hover:brightness-110" style="background:#DBEAFE; color:#1E40AF;">Kolay</button>
