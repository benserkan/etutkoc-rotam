# Render.com Blueprint — bu repo'yu Render'a bağladığında otomatik kurulur.
# 1) https://render.com hesabı aç
# 2) New > Blueprint > GitHub repo bağla
# 3) Bu dosya bulunur ve aşağıdaki servisler kurulur

services:
  - type: web
    name: etutkoc-rotam
    runtime: docker
    plan: free  # ileride: starter ($7/ay)
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: 8000
      - key: DEBUG
        value: "false"
      - key: SESSION_SECRET
        generateValue: true   # Render rastgele güvenli değer üretir
      - key: DATABASE_URL
        fromDatabase:
          name: etutkoc-rotam-db
          property: connectionString
      - key: APP_BASE_URL
        sync: false   # deploy sonrası kendi URL'ni gir (https://etutkoc-rotam.onrender.com)
      # Email (opsiyonel — başlangıçta devre dışı)
      - key: EMAIL_ENABLED
        value: "false"
      # SMTP_* değerlerini ileride dashboard'dan ekle
      # Anthropic Claude — kitap şablonu AI önerisi (Faz B). Yoksa AI butonu
      # friendly hata mesajı verir, şablon manuel akışı çalışır.
      - key: ANTHROPIC_API_KEY
        sync: false   # secret — Render dashboard'dan manuel gir

databases:
  - name: etutkoc-rotam-db
    plan: free   # 1GB, 90 gün retention; ileride starter ($7/ay)
    databaseName: etutkoc
    user: etutkoc
